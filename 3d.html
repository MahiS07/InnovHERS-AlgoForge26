            jupiter: { name: 'Jupiter', radius: 2.5, color: 0xDAA520, mass: 1.898e27, distance: 35, period: 4333, type: 'Gas Giant', diameter: '139,820 km', fact: 'Jupiter has 95 known moons and its Great Red Spot is a storm larger than Earth.' },
            saturn: { name: 'Saturn', radius: 2.2, color: 0xF4A460, mass: 5.683e26, distance: 45, period: 10759, type: 'Gas Giant', diameter: '116,460 km', fact: 'Saturn is the only planet less dense than water - it would float in a giant bathtub!' },
            uranus: { name: 'Uranus', radius: 1.8, color: 0x4FD0E0, mass: 8.681e25, distance: 55, period: 30687, type: 'Ice Giant', diameter: '50,724 km', fact: 'Uranus rotates on its side at a 98-degree angle, likely from a massive collision.' },
            neptune: { name: 'Neptune', radius: 1.7, color: 0x4169E1, mass: 1.024e26, distance: 65, period: 60190, type: 'Ice Giant', diameter: '49,244 km', fact: 'Neptune has the fastest winds in the solar system, reaching 2,100 km/h.' }
        };

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 80);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Raycaster for clicks
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 2, 200);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);

            // Add stars
            addStars();

            // Create solar system
            createSolarSystem();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('click', onPlanetClick);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('wheel', onMouseWheel);

            // Start animation
            animate();
        }

        function addStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });

            const starsVertices = [];
            for (let i = 0; i < 3000; i++) {
                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 0.5) * 400;
                const z = (Math.random() - 0.5) * 400;
                starsVertices.push(x, y, z);
            }

            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        function createSolarSystem() {
            planets = [];
            orbits = [];

            // Clear existing
            scene.children = scene.children.filter(child => 
                !(child.userData.isPlanet || child.userData.isOrbit)
            );

            // Create Sun
            const sunGeometry = new THREE.SphereGeometry(planetData.sun.radius, 32, 32);
            const sunMaterial = new THREE.MeshBasicMaterial({ color: planetData.sun.color });
            const sun = new THREE.Mesh(sunGeometry, sunMaterial);
            sun.userData = { isPlanet: true, data: planetData.sun, angle: 0 };
            scene.add(sun);
            planets.push(sun);

            // Create planets
            Object.keys(planetData).forEach(key => {
                if (key === 'sun') return;

                const data = planetData[key];
                
                // Create orbit line
                const orbitGeometry = new THREE.BufferGeometry();
                const orbitPoints = [];
                for (let i = 0; i <= 64; i++) {
                    const angle = (i / 64) * Math.PI * 2;
                    orbitPoints.push(
                        Math.cos(angle) * data.distance,
                        0,
                        Math.sin(angle) * data.distance
                    );
                }
                orbitGeometry.setAttribute('position', new THREE.Float32BufferAttribute(orbitPoints, 3));
                const orbitMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.2, transparent: true });
                const orbit = new THREE.Line(orbitGeometry, orbitMaterial);
                orbit.userData = { isOrbit: true };
                scene.add(orbit);
                orbits.push(orbit);

                // Create planet
                const planetGeometry = new THREE.SphereGeometry(data.radius, 32, 32);
                const planetMaterial = new THREE.MeshStandardMaterial({ color: data.color });
                const planet = new THREE.Mesh(planetGeometry, planetMaterial);
                
                // Initial position
                planet.position.x = data.distance;
                planet.userData = { 
                    isPlanet: true, 
                    data: data, 
                    angle: Math.random() * Math.PI * 2,
                    distance: data.distance,
                    period: data.period
                };
                
                scene.add(planet);
                planets.push(planet);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update planet positions
            planets.forEach(planet => {
                if (planet.userData.data.name === 'Sun') return;

                const data = planet.userData;
                if (data.period > 0 && timeSpeed > 0) {
                    data.angle += (0.001 * timeSpeed) / (data.period / 365);
                    planet.position.x = Math.cos(data.angle) * data.distance;
                    planet.position.z = Math.sin(data.angle) * data.distance;
                }
            });

            renderer.render(scene, camera);
        }

        // Event handlers
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPlanetClick(event) {
            if (isDragging) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);

            if (intersects.length > 0) {
                const planet = intersects[0].object;
                if (planet.userData.isPlanet) {
                    showInfoPanel(planet.userData.data);
                    openDetailDrawer(planet.userData.data.name.toLowerCase());
                }
            }
        }

        function onMouseDown(event) {
            isDragging = false;
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseMove(event) {
            if (event.buttons === 1) {
                isDragging = true;
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;

                camera.position.x -= deltaX * 0.1;
                camera.position.y += deltaY * 0.1;
                camera.lookAt(0, 0, 0);

                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        }

        function onMouseUp() {
            setTimeout(() => { isDragging = false; }, 100);
        }

        function onMouseWheel(event) {
            const delta = event.deltaY * 0.05;
            camera.position.z += delta;
            camera.position.z = Math.max(30, Math.min(150, camera.position.z));
        }

        // UI Functions
        function setTimeSpeed(speed) {
            timeSpeed = speed;
            document.getElementById('timeDisplay').textContent = speed === 0 ? 'Paused' : `${speed}x`;
        }

        function toggleOrbits() {
            const show = document.getElementById('showOrbits').checked;
            orbits.forEach(orbit => orbit.visible = show);
        }

        function showInfoPanel(data) {
            document.getElementById('infoPanel').classList.remove('hidden');
            document.getElementById('planetName').textContent = data.name;
            document.getElementById('planetType').textContent = data.type;
            document.getElementById('planetMass').textContent = data.mass.toExponential(2) + ' kg';
            document.getElementById('planetDiameter').textContent = data.diameter;
            document.getElementById('planetDistance').textContent = (data.distance * 10) + ' million km';
            document.getElementById('planetPeriod').textContent = data.period + ' Earth days';
            document.getElementById('planetFact').textContent = data.fact;
            
            lucide.createIcons();
        }

        function closeInfoPanel() {
            document.getElementById('infoPanel').classList.add('hidden');
        }

        function openDetailDrawer(planetKey) {
            const details = planetDetails[planetKey];
            if (!details) return;

            // Populate drawer content
            document.getElementById('drawerPlanetName').textContent = details.name;
            document.getElementById('drawerPlanetImage').src = details.image;
            document.getElementById('drawerPlanetImage').alt = details.name;
            
            // Quick stats (from planetData)
            const data = planetData[planetKey];
            if (data) {
                document.getElementById('drawerDiameter').textContent = data.diameter;
                document.getElementById('drawerMass').textContent = data.mass.toExponential(2) + ' kg';
                document.getElementById('drawerDistance').textContent = data.distance === 0 ? 'Center' : (data.distance * 10) + ' million km';
                document.getElementById('drawerPeriod').textContent = data.period === 0 ? 'N/A (Star)' : data.period + ' Earth days';
            }
            
            // Detailed content
            document.getElementById('drawerOverview').textContent = details.overview;
            document.getElementById('drawerAtmosphere').textContent = details.atmosphere;
            document.getElementById('drawerGravity').textContent = details.gravity;
            document.getElementById('drawerMoons').textContent = details.moons;
            document.getElementById('drawerMissions').textContent = details.missions;
            document.getElementById('drawerFunFact').textContent = details.funFact;
            
            // Show drawer with slide-in animation
            const drawer = document.getElementById('planetDrawer');
            drawer.classList.remove('translate-x-full');
            drawer.classList.add('translate-x-0');
            
            // Reinitialize icons
            lucide.createIcons();
        }

        function closeDetailDrawer() {
            const drawer = document.getElementById('planetDrawer');
            drawer.classList.remove('translate-x-0');
            drawer.classList.add('translate-x-full');
        }

        // Scenarios
        function loadScenario(type) {
            switch(type) {
                case 'default':
                    resetSimulation();
                    break;
                case 'twoMoons':
                    // TODO: Add second moon to Earth
                    alert('Two Moons scenario: Coming soon! This will add a second moon orbiting Earth.');
                    break;
                case 'noJupiter':
                    // Hide Jupiter
                    planets.forEach(p => {
                        if (p.userData.data?.name === 'Jupiter') {
                            p.visible = false;
                        }
                    });
                    break;
                case 'jupiterClose':
                    // Move Jupiter closer
                    planets.forEach(p => {
                        if (p.userData.data?.name === 'Jupiter') {
                            p.userData.distance = 15;
                        }
                    });
                    break;
                case 'collision':
                    alert('Planet Collision scenario: Coming soon! Watch as two planets collide.');
                    break;
            }
        }

        function resetSimulation() {
            createSolarSystem();
            closeInfoPanel();
            closeLesson();
            removeHabitableZone();
            removeTrajectory();
        }

        // ============================================

        const quizzes = {
            habitable: {
                question: 'Which planet is fully in the habitable zone?',
                options: ['Venus', 'Earth', 'Mars', 'Jupiter'],
                correct: 1,
                explanation: 'Earth is the only planet fully in the habitable zone, allowing liquid water on its surface!'
            },
            kepler: {
                question: 'Why does Mercury orbit faster than Neptune?',
                options: ['It\'s smaller', 'It\'s closer to the Sun', 'It\'s hotter', 'It has no moons'],
                correct: 1,
                explanation: 'Mercury orbits faster because it\'s closer to the Sun (Kepler\'s 3rd Law). Distance determines orbital period!'
            },
            gravity: {
                question: 'How does Jupiter protect Earth?',
                options: ['Blocks sunlight', 'Pulls away asteroids', 'Creates magnetic field', 'Reflects heat'],
                correct: 1,
                explanation: 'Jupiter\'s massive gravity pulls dangerous asteroids and comets away from the inner solar system!'
            },

                question: 'How long does it take to reach Mars?',
                options: ['2 weeks', '2 months', '6-9 months', '2 years'],

                explanation: 'Using a Hohmann transfer orbit, the trip takes 6-9 months when Earth and Mars are properly aligned!'
            },
            exoplanets: {
                question: 'How many exoplanets have we discovered?',
                options: ['About 100', 'About 500', 'About 5,000', 'About 50,000'],

            },

        function startLesson(lessonId) {
            currentLesson = lessonId;
            lessonStep = 0;
            
            const lesson = lessons[lessonId];
            document.getElementById('lessonTitle').textContent = lesson.title;
            document.getElementById('lessonOverlay').classList.remove('hidden');
            
            showLessonStep();
        }

        function showLessonStep() {
            const lesson = lessons[currentLesson];
            const step = lesson.steps[lessonStep];
            
            document.getElementById('lessonContent').innerHTML = `<p>${step.text}</p>`;
            document.getElementById('progressText').textContent = `${lessonStep + 1}/${lesson.steps.length}`;
            document.getElementById('progressBar').style.width = `${((lessonStep + 1) / lesson.steps.length) * 100}%`;
            
            if (step.action) step.action();
            
            if (lessonStep === lesson.steps.length - 1) {
                document.getElementById('nextStepBtn').innerHTML = '<span>Complete</span><i data-lucide="check" class="w-4 h-4"></i>';
            }
            
            lucide.createIcons();
        }

        function nextLessonStep() {
            const lesson = lessons[currentLesson];
            
            if (lessonStep < lesson.steps.length - 1) {
                lessonStep++;
                showLessonStep();
            } else {
                closeLesson();
            }
        }

        function closeLesson() {
            document.getElementById('lessonOverlay').classList.add('hidden');
            document.getElementById('quizOverlay').classList.add('hidden');
            currentLesson = null;
            lessonStep = 0;
            removeHabitableZone();
        }

        function showQuiz(quizId) {
            const quiz = quizzes[quizId];
            document.getElementById('quizQuestion').textContent = quiz.question;
            
            const optionsHtml = quiz.options.map((option, index) => `
                <button onclick="checkAnswer(${index}, '${quizId}')" 
                        class="w-full p-2 bg-white/5 hover:bg-white/10 rounded text-white text-xs text-left transition-all">
                    ${option}
                </button>
            `).join('');
            
            document.getElementById('quizOptions').innerHTML = optionsHtml;
            document.getElementById('quizFeedback').classList.add('hidden');
            document.getElementById('quizOverlay').classList.remove('hidden');
        }

        function checkAnswer(selected, quizId) {
            const quiz = quizzes[quizId];
            const feedback = document.getElementById('quizFeedback');
            
            if (selected === quiz.correct) {
                feedback.className = 'mt-3 p-2 rounded text-xs bg-green-500/20 border border-green-500/30';
                feedback.innerHTML = `<div class="text-green-400 font-medium mb-0.5">✓ Correct!</div>
                                     <div class="text-white/70">${quiz.explanation}</div>`;
            } else {
                feedback.className = 'mt-3 p-2 rounded text-xs bg-red-500/20 border border-red-500/30';
                feedback.innerHTML = `<div class="text-red-400 font-medium mb-0.5">✗ Not quite</div>
                                     <div class="text-white/70">${quiz.explanation}</div>`;
            }
            
            feedback.classList.remove('hidden');
        }

        // Visual helpers for lessons
        function showHabitableZone() {
            removeHabitableZone();
            
            const innerRadius = 18;
            const outerRadius = 23;
            
            const geometry = new THREE.RingGeometry(innerRadius, outerRadius, 64);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00ff00, 
                opacity: 0.15, 
                transparent: true,
                side: THREE.DoubleSide
            });
            
            habitableZone = new THREE.Mesh(geometry, material);
            habitableZone.rotation.x = Math.PI / 2;
            scene.add(habitableZone);
        }

        function removeHabitableZone() {
            if (habitableZone) {
                scene.remove(habitableZone);
                habitableZone = null;
            }
        }

        function highlightPlanet(planetName) {
            planets.forEach(p => {
                if (p.userData.data?.name.toLowerCase() === planetName.toLowerCase()) {
                    zoomToPlanet(planetName);
                }
            });
        }

        function highlightPlanets(planetNames) {
            // Zoom out to show multiple planets
            camera.position.set(0, 50, 100);
            camera.lookAt(0, 0, 0);
        }

        function highlightOrbit(planetName) {
            // Orbits already visible, just zoom to planet
            highlightPlanet(planetName);
        }

        function zoomToPlanet(planetName) {
            planets.forEach(p => {
                if (p.userData.data?.name.toLowerCase() === planetName.toLowerCase()) {
                    const distance = p.userData.distance || 10;
                    camera.position.set(distance + 15, 20, distance + 15);
                    camera.lookAt(p.position);
                }
            });
        }

        function showTransferOrbit() {
            removeTrajectory();
            
            const earthDist = 20;
            const marsDist = 25;
            
            const curve = new THREE.EllipseCurve(
                0, 0,
                (earthDist + marsDist) / 2, (earthDist + marsDist) / 2,
                0, Math.PI,
                false,
                0
            );
            
            const points = curve.getPoints(50);
            const geometry = new THREE.BufferGeometry().setFromPoints(
                points.map(p => new THREE.Vector3(p.x, 0, p.y))
            );
            
            const material = new THREE.LineBasicMaterial({ 
                color: 0xff6600, 
                linewidth: 2 
            });
            
            trajectoryLine = new THREE.Line(geometry, material);
            scene.add(trajectoryLine);
        }

        function removeTrajectory() {
            if (trajectoryLine) {
                scene.remove(trajectoryLine);
                trajectoryLine = null;
            }
        }

        function showExoplanetComparison() {
            // Show comparison info in lesson overlay
            document.getElementById('lessonContent').innerHTML = `
                <p class="mb-3">TRAPPIST-1e is an exoplanet 40 light-years away, similar size to Earth, in the habitable zone!</p>
                <div class="bg-white/5 p-3 rounded-lg text-xs space-y-2">
                    <div class="flex justify-between"><span class="text-gray-400">Size vs Earth:</span><span>1.02x</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Distance from star:</span><span>0.029 AU</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Year length:</span><span>6.1 Earth days</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Star type:</span><span>Red dwarf</span></div>
                </div>
            `;
        }

        // Initialize
        init();
    </script>
